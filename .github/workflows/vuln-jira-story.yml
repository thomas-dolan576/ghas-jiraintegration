name: "Vuln → Jira Story (VULN)"

# Runs after the CodeQL workflow completes on the default branch — i.e. a
# vulnerability may have been merged into production code. The script pulls
# open code scanning alerts from the API; JQL dedup (label per alert) means
# only alerts without an existing VULN story get one, so re-runs are safe.
# Note: `code_scanning_alert` is a webhook event only — NOT a valid Actions
# trigger — hence the workflow_run pattern.
# Also supports manual runs against a fixture for testing before the
# Jira service account exists.
on:
  workflow_run:
    workflows: ["CodeQL"]   # must match the `name:` of your CodeQL workflow
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      source:
        description: "Alert source (empty dispatch inputs fall back to defaults, so this is an explicit switch)"
        type: choice
        options: [fixture, api]
        default: fixture
      fixture:
        description: "Path to alert fixture JSON (used when source=fixture)"
        required: false
        default: "ghas-jiraintegration/fixtures/sample_alerts.json"
      dry_run:
        description: "true = log Jira payload only, don't create issues"
        required: false
        default: "true"

permissions:
  contents: read
  security-events: read   # required to list code scanning alerts via the API

concurrency:
  group: vuln-jira-${{ github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  create-story:
    runs-on: ubuntu-latest
    # Manual runs always allowed; workflow_run only when CodeQL succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create Jira story (stdlib only, no pip installs)
        env:
          # DRY_RUN precedence: manual input > repo variable > default true.
          # Flip vars.JIRA_DRY_RUN to "false" at go-live. No code change needed.
          DRY_RUN: ${{ inputs.dry_run || vars.JIRA_DRY_RUN || 'true' }}

          # Used to list open code scanning alerts for this repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Credentials: use your personal Atlassian API token now;
          # swap these two secrets to the service account later.
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL || 'https://snapsheettech.atlassian.net' }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'VULN' }}
          # 17745 = "Story" issue type in the VULN team-managed project
          JIRA_ISSUE_TYPE_ID: ${{ vars.JIRA_ISSUE_TYPE_ID || '17745' }}

          # Optional — Slack incoming webhook; step is a no-op without it
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # fixture only when explicitly chosen; workflow_run always uses the API
          ALERT_FIXTURE: ${{ inputs.source == 'fixture' && inputs.fixture || '' }}
        run: python ghas-jiraintegration/scripts/create_vuln_stories.py

      - name: Upload payload artifact (dry-run evidence)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jira-payloads-${{ github.run_id }}
          path: jira-payloads/
          if-no-files-found: ignore
